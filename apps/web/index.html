<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marlen — Email Agent</title>
    <meta
      name="description"
      content="Marlen is a local email agent. Chat with your inbox, connect Gmail or Outlook, and run the agent on a schedule."
    />
    <!-- Hex mirrors of --background in src/index.css (meta tags can't read CSS vars);
         keep in sync when the palette changes. -->
    <meta name="theme-color" content="#fcfbfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d10" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marlen — Email Agent" />
    <meta
      property="og:description"
      content="A local email agent. Chat with your inbox, connect Gmail or Outlook, and run it on a schedule."
    />
    <!-- Geist is self-hosted; see the @font-face rules in src/index.css. -->
    <link
      rel="preload"
      href="/fonts/Geist-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
