# Packaging + update feed for the desktop shell. Input is build/app (assembled
# by scripts/build.mjs, node_modules installed by the dist script); output
# lands in dist/. `publish` doubles as the electron-updater feed baked into
# the app: releases live on the GitHub repo, and a published release is what
# running apps offer as an update.
appId: email.marlen.desktop
productName: Marlen
directories:
  app: build/app
  output: dist
  # Holds icon.png (rendered from icon.svg — the web logo on an Apple-grid
  # tile); electron-builder derives the platform formats (icns/ico) from it.
  buildResources: resources

# One archive instead of ~16k loose files. File count is what the first launch
# after an install or update costs: Windows Defender scans every file on access,
# which is why the same build starts far slower there than on macOS.
asar: true
# Everything read as a real file rather than through Electron's asar-aware fs:
# native binaries, the server bundle the utility process forks (plus the prompt
# and instruction texts it reads beside itself), the web dist @fastify/static
# streams, and pino's transport, which resolves its target in a worker thread.
asarUnpack:
  - "**/*.node"
  - "server/**"
  - "web/**"
  - "node_modules/{pino,pino-roll,thread-stream,sonic-boom}/**"

# Dev artifacts npm packages ship but the runtime never opens: sourcemaps,
# TypeScript sources and declarations, docs, tests. They are ~46% of the file
# count, and file count is what the first launch after an install or update
# costs, most of all on Windows, where Defender scans each one on access.
# Scoped to node_modules: the app's own .md files are data (server/prompts,
# server/instructions are read at runtime), not documentation.
files:
  - "**/*"
  - "!node_modules/**/*.{map,ts,mts,cts,md,markdown}"
  - "!node_modules/**/{test,tests,__tests__,__mocks__,docs,example,examples,.github}/**"

publish:
  provider: github
  owner: Huti-K
  repo: Marlen

mac:
  category: public.app-category.productivity
  # zip is what electron-updater consumes on macOS; dmg is for humans.
  target:
    - dmg
    - zip
  # Purpose strings for macOS's one-time folder-permission dialogs, shown
  # when the assistant's file tools first touch a protected folder.
  extendInfo:
    NSDesktopFolderUsageDescription: The assistant reads and writes files here only when you ask it to.
    NSDocumentsFolderUsageDescription: The assistant reads and writes files here only when you ask it to.
    NSDownloadsFolderUsageDescription: The assistant reads and writes files here only when you ask it to.
    NSMicrophoneUsageDescription: Voice input in chat uses the microphone only while you are recording a message.

win:
  target: nsis
  # Windows code signing via Azure Trusted Signing — uncomment when the Azure
  # account exists and the AZURE_* secrets are enabled in release.yml. Values
  # come from the Trusted Signing resource (README → Signing).
  # azureSignOptions:
  #   endpoint: https://weu.codesigning.azure.net
  #   codeSigningAccountName: <trusted-signing-account>
  #   certificateProfileName: <certificate-profile>
