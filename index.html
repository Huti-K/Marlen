  a.btn .glyph { width: 18px; height: 18px; flex: none; opacity: .9; }
  a.btn .label { flex: 1; }
  a.btn .size {

    font-weight: 400; font-size: 12px; opacity: .7;
  }
  a.btn:hover { filter: brightness(0.97); }
  a.btn.primary { background: var(--accent); color: var(--accent-ink); }
  a.btn.primary .size { opacity: .8; }
  a.btn.primary:hover { filter: brightness(1.06); }
  a.btn.disabled { pointer-events: none; opacity: .5; }
  a.btn:focus-visible, footer a:focus-visible {

  footer a { color: var(--muted); text-decoration: none; border-radius: 4px; transition: color .15s ease; }
  footer a:hover { color: var(--accent); }

<script>
  const REPO = "Huti-K/Marlen";
  const SUFFIX = { windows: ".exe", mac: ".dmg" };

  function detectOS() {
    const p = (navigator.userAgentData?.platform || navigator.platform || "").toLowerCase();
    return p.includes("mac") ? "mac" : "windows";
  }

  function mb(bytes) { return (bytes / 1048576).toFixed(1).replace(".", ",") + " MB"; }

  async function load() {
    const meta = document.getElementById("meta");
    let release;
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
      if (!res.ok) throw new Error(res.status);
      release = await res.json();
    } catch {
      meta.textContent = "Noch kein Release veröffentlicht. Schau bald wieder vorbei.";
      return;
    }
    const os = detectOS();
    const date = new Date(release.published_at).toLocaleDateString("de-DE",
      { day: "numeric", month: "long", year: "numeric" });
    meta.textContent = `Version ${release.tag_name.replace(/^v/, "")} · ${date}`;
    for (const btn of document.querySelectorAll("[data-os]")) {
      const key = btn.dataset.os;
      const asset = release.assets.find((a) => a.name.endsWith(SUFFIX[key]));
      if (!asset) continue;
      btn.href = asset.browser_download_url;
      btn.classList.remove("disabled");
      btn.querySelector(".size").textContent = `${SUFFIX[key]} · ${mb(asset.size)}`;
      if (key === os) {
        btn.classList.add("primary");
        btn.parentElement.prepend(btn);
      }
    }
  }
  load();
</script>
