<title>Marlen · Download</title>
<meta name="description" content="Marlen herunterladen, der lokale KI-E-Mail-Agent für Windows und macOS.">

<link rel="preload" href="fonts/Geist-Variable.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Geist";
    src: url("fonts/Geist-Variable.woff2") format("woff2");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Geist Mono";
    src: url("fonts/GeistMono-Variable.woff2") format("woff2");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }

  :root {
    --bg: #f4f4f5; --surface: #ffffff; --surface-2: #ececee;
    --ink: #27272a; --muted: #71717a; --accent: #702eff; --accent-ink: #fafafa;
    --ring: color-mix(in srgb, var(--accent) 55%, transparent);
    --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161618; --surface: #232327; --surface-2: #2d2d32;
      --ink: #e7e7ea; --muted: #9d9da6; --accent: #702eff; --accent-ink: #101012;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink); min-height: 100dvh;
    font-family: var(--font-sans); font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    display: grid; place-items: center; padding: 32px 24px;
  }
  main {
    width: 100%; max-width: 552px;
    animation: rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { main { animation: none; } }

  .mark { display: flex; align-items: center; gap: 14px; }
  .mark svg { width: 42px; height: auto; flex: none; }
  .mark h1 { font-size: 27px; font-weight: 600; letter-spacing: -0.02em; }
  .mark .tag { color: var(--muted); font-size: 14px; margin-top: 1px; }
  .lede { margin-top: 20px; color: var(--muted); font-size: 16px; max-width: 42ch; text-wrap: balance; }

  .card { background: var(--surface); border-radius: 14px; padding: 24px; margin-top: 28px; }
  .meta {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    color: var(--muted); font-size: 12.5px; letter-spacing: .01em;
    margin-bottom: 18px; min-height: 1.2em;
  }
  .buttons { display: grid; gap: 10px; }
  a.btn {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; border-radius: 10px; text-decoration: none;
    background: var(--surface-2); color: var(--ink);
    font-weight: 600; font-size: 15px;
    transition: filter .15s ease;
  }
  a.btn .glyph { width: 18px; height: 18px; flex: none; opacity: .9; }
  a.btn .label { flex: 1; }
  a.btn .size {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-weight: 400; font-size: 12px; opacity: .7;
  }
  a.btn:hover { filter: brightness(0.97); }
  a.btn.primary { background: var(--accent); color: var(--accent-ink); }
  a.btn.primary .size { opacity: .8; }
  a.btn.primary:hover { filter: brightness(1.06); }
  a.btn.disabled { pointer-events: none; opacity: .5; }
  a.btn:focus-visible, footer a:focus-visible {
    outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ring);
  }

  footer {
    margin-top: 26px; font-size: 13px; color: var(--muted);
    display: flex; gap: 18px; padding: 0 4px;
  }
  footer a { color: var(--muted); text-decoration: none; border-radius: 4px; transition: color .15s ease; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<main>
  <div class="mark">
    <svg viewBox="0 0 288 243" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M287.5 209.11L233.5 196V62L199.397 89.7686C203.122 140.432 188.802 161.012 159.5 193C181.351 207.946 194.768 213.957 220.5 221V242.5C187.319 232.254 170.058 224.803 144 205.5C115.914 225.35 99.0324 232.634 68 242.5V221C91.4174 214.135 104.656 208.182 128.5 193C96.1303 161.068 85.12 125.771 88.96 89.5791L54 62V196L0 209.11L34 0L144 101L166.5 82L167.462 85.3242L174.5 106L144.5 133L144.995 131.861L144 133L107.138 103.92C108.764 130.39 118.819 140.393 144 169C193.5 119.5 193.5 76.5 144 30C130.558 41.009 125.106 48.1837 117.5 62L101.5 48.5C115.105 29.9676 123.726 20.0253 144 4.5C168.022 23.9409 178.472 35.721 191 58.5L253.5 0L287.5 209.11Z" fill="#702EFF"/>
    </svg>
    <div>
      <h1>Marlen</h1>
      <div class="tag">Der lokale KI-E-Mail-Agent</div>
    </div>
  </div>

  <p class="lede">Liest, schreibt und ordnet deine Mails, direkt auf deinem Rechner.</p>

  <div class="card">
    <p class="meta" id="meta">Lade aktuelle Version …</p>
    <div class="buttons" id="buttons">
      <a class="btn disabled" data-os="mac" href="#">
        <svg class="glyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.37 1.43c0 1.14-.42 2.2-1.12 2.99-.76.87-1.99 1.54-3.14 1.45-.14-1.13.42-2.32 1.1-3.08.76-.87 2.07-1.5 3.16-1.36zM19.5 17.02c-.53 1.24-.79 1.79-1.47 2.88-.95 1.53-2.29 3.44-3.95 3.45-1.47.02-1.85-.95-3.85-.94-2 .01-2.42.96-3.89.94-1.66-.01-2.93-1.73-3.88-3.26-2.66-4.29-2.94-9.31-1.3-11.98C2.44 6.75 4.28 5.64 6.01 5.64c1.76 0 2.87.97 4.33.97 1.41 0 2.27-.97 4.31-.97 1.54 0 3.18.84 4.34 2.29-3.81 2.08-3.19 7.52.51 9.09z"/></svg>
        <span class="label">Download für macOS</span><span class="size">.dmg</span>
      </a>
      <a class="btn disabled" data-os="windows" href="#">
        <svg class="glyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 5.1 10.4 4v7.1H3zM11.6 3.85 21 2.5v8.6h-9.4zM3 12.9h7.4V20L3 18.9zM11.6 12.9H21v8.6l-9.4-1.35z"/></svg>
        <span class="label">Download für Windows</span><span class="size">.exe</span>
      </a>
    </div>
  </div>

  <footer>
    <a href="https://github.com/Huti-K/Marlen">GitHub</a>
    <a href="https://github.com/Huti-K/Marlen/releases">Alle Versionen</a>
  </footer>
</main>

<script>
  const REPO = "Huti-K/Marlen";
  const SUFFIX = { windows: ".exe", mac: ".dmg" };

  function detectOS() {
    const p = (navigator.userAgentData?.platform || navigator.platform || "").toLowerCase();
    return p.includes("mac") ? "mac" : "windows";
  }

  function mb(bytes) { return (bytes / 1048576).toFixed(1).replace(".", ",") + " MB"; }

  async function load() {
    const meta = document.getElementById("meta");
    let release;
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
      if (!res.ok) throw new Error(res.status);
      release = await res.json();
    } catch {
      meta.textContent = "Noch kein Release veröffentlicht. Schau bald wieder vorbei.";
      return;
    }
    const os = detectOS();
    const date = new Date(release.published_at).toLocaleDateString("de-DE",
      { day: "numeric", month: "long", year: "numeric" });
    meta.textContent = `Version ${release.tag_name.replace(/^v/, "")} · ${date}`;
    for (const btn of document.querySelectorAll("[data-os]")) {
      const key = btn.dataset.os;
      const asset = release.assets.find((a) => a.name.endsWith(SUFFIX[key]));
      if (!asset) continue;
      btn.href = asset.browser_download_url;
      btn.classList.remove("disabled");
      btn.querySelector(".size").textContent = `${SUFFIX[key]} · ${mb(asset.size)}`;
      if (key === os) {
        btn.classList.add("primary");
        btn.parentElement.prepend(btn);
      }
    }
  }
  load();
</script>
</body>
</html>
