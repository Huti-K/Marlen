name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format (Biome)
        run: pnpm exec biome ci --error-on-warnings .

      - name: Conventions (line cap, test layout, provider registration)
        run: node scripts/check-conventions.mjs

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Web build
        run: pnpm --filter @trailin/web build

      - name: Tests
        run: pnpm --filter @trailin/server test
