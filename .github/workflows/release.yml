# The update feed: pushing a v* tag builds the desktop app for all three
# platforms and uploads the installers to a draft GitHub release. Publishing
# that release is what makes running apps see the update (electron-updater
# polls the repo's releases). Bump apps/desktop/package.json's version to
# match the tag before tagging — that version is what installed apps compare
# against.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Both platform builders publish into one draft release. Created up front
  # because two electron-builder jobs racing to create it end up with two
  # drafts for the same tag, each holding half the assets.
  draft:
    runs-on: ubuntu-latest
    steps:
      - run: >
          gh release view "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
          gh release create "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" --draft
          --title "$GITHUB_REF_NAME" --notes ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Web build
        run: pnpm --filter @trailin/web build

      - name: Package & upload to draft release
        run: pnpm --filter @trailin/desktop dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Never hunt the runner keychain for identities; builds ship
          # unsigned until the signing accounts exist. Signing env vars must
          # be ABSENT while unused — electron-builder treats even an empty
          # CSC_LINK as a certificate path and the build dies on it. How to
          # add them per platform: README → Signing.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
